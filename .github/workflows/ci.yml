name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-22.04
          - name: macOS
            runner: macos-latest
          - name: Windows
            runner: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just@1.51.0
          fallback: none

      - name: Install frontend dependencies
        run: just install

      - name: Run checks and tests
        run: just check

      - name: Validate Linux statx accounting and cancellation
        if: runner.os == 'Linux'
        shell: bash
        run: |
          fixture="$RUNNER_TEMP/cepa-statx-fixture"
          just benchmark-fixture "$fixture" 32 128 4096
          printf 'hard-link fixture\n' > "$fixture/hard-link-source.bin"
          ln "$fixture/hard-link-source.bin" "$fixture/group-0000/hard-link-copy.bin"
          ln -s /etc "$fixture/external-directory-link"
          just validate-scan "$fixture" jwalk statx
          just benchmark-cancellation "$fixture" statx 3 1024

      - name: Build native application
        run: just build
